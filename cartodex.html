<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartodex</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: url('background.png') center center / cover no-repeat;
      font-family: sans-serif;
      padding: 2rem 1rem;
    }

    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 2rem;
    }

    #back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      color: white;
      text-decoration: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      transition: background 0.2s;
    }
    #back-btn:hover { background: rgba(255, 255, 255, 0.25); }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #ffe066;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    #compteur {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    #grille {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .carte-slot {
      width: 250px;
      height: 350px;
      border-radius: 14px;
      overflow: hidden;
      border: 3px solid rgba(160, 200, 255, 0.5);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.2);
    }
    .carte-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .carte-slot.obtenue {
      border-color: #a0c8ff;
      box-shadow: 0 0 30px rgba(100, 180, 255, 0.45);
    }
  </style>
</head>
<body>

  <div id="header">
    <a id="back-btn" href="index.html">← Retour</a>
    <h1>Cartodex</h1>
  </div>

  <p id="compteur"></p>
  <div id="grille"></div>

  <script>
    // Liste des 10 cartes dans l'ordre
    const toutes = [
      'fouille.png',
      'fouille2.png',
      'fouille3.png',
      'fouille4.png',
      'fouille5.png',
      'fouille6.png',
      'fouille7.png',
      'fouille8.png',
      'fouille9.png',
      'fouille10.png'
    ];

    const obtenues = JSON.parse(localStorage.getItem('cartodex') || '[]');
    const grille = document.getElementById('grille');
    const compteur = document.getElementById('compteur');

    compteur.textContent = obtenues.length + ' / ' + toutes.length + ' cartes obtenues';

    toutes.forEach((carte, index) => {
      const slot = document.createElement('div');
      slot.className = 'carte-slot' + (obtenues.includes(index) ? ' obtenue' : '');

      const img = document.createElement('img');
      img.src = obtenues.includes(index) ? carte : 'inconnu.png';
      img.alt = obtenues.includes(index) ? 'Carte ' + (index + 1) : 'Inconnue';

      slot.appendChild(img);
      grille.appendChild(slot);
    });
  </script>

</body>
</html>
